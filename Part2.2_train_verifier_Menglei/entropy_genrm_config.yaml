project:
  name: eg-genrm-vanilla
  seed: 42

model:
  base_model: Qwen/Qwen2.5-1.5B-Instruct
  trust_remote_code: true
  use_lora: true

lora:
  r: 16
  alpha: 32
  dropout: 0.05
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj

data:
  train_file: data/final_verifier_sft_train.jsonl
  valid_file: data/final_verifier_sft_valid.jsonl
  test_file: data/final_verifier_sft_test.jsonl
  max_seq_length: 2048

training:
  output_dir: outputs/checkpoints/vanilla_genrm
  num_train_epochs: 1
  per_device_train_batch_size: 1
  per_device_eval_batch_size: 1
  gradient_accumulation_steps: 8
  learning_rate: 1.0e-4
  weight_decay: 0.01
  warmup_ratio: 0.03
  logging_steps: 10
  save_steps: 200
  eval_steps: 200
  save_total_limit: 2
  bf16: true
  fp16: false
  gradient_checkpointing: true
  report_to: none

evaluation:
  max_new_tokens: 512
  temperature: 0.0
  do_sample: false
